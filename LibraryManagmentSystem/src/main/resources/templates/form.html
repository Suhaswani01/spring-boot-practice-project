<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
</head>
<body>

    <h2>➕ Add New Book</h2>
    <hr/>

    <form th:action="@{/library/save}" 
          method="post">

        Title:
        <input type="text" 
               name="title"
               placeholder="Enter Title"/>
        <br/><br/>

        Author:
        <input type="text" 
               name="author"
               placeholder="Enter Author"/>
        <br/><br/>

        Price:
        <input type="number" 
               name="price"
               placeholder="Enter Price"/>
        <br/><br/>

        <button type="submit">
            💾 Save Book
        </button>

    </form>

    <br/>
    <a href="/library/home">🏠 Home</a>

</body>
</html>
